      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Row 1: Single (A♠) -->
  <g transform="translate(148 14)">
    <rect width="44" height="32" rx="4" fill="#f0f0f0" filter="url(#cs)" />
