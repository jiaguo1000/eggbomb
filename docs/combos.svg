  <!-- Row 7: Wildcard (7♥ → ?♠ ?♥ ?♣ ?♦) -->
  <!-- Source card with golden border -->
  <g transform="translate(39 374)">
    <rect width="44" height="32" rx="4" fill="#f0f0f0" stroke="#c8922a" stroke-width="2.5" filter="url(#cs)" />
    <text x="22" y="21" text-anchor="middle" font-size="14" font-weight="700" fill="#c0392b">7♥</text>
  </g>
  <!-- Arrow -->
  <text x="98" y="395" text-anchor="middle" font-size="14" fill="#888">→</text>
  <!-- Wildcard placeholders -->
  <g transform="translate(113 374)">
    <rect width="44" height="32" rx="4" fill="#e8e8e8" stroke="#999" stroke-width="1.5" stroke-dasharray="3 2" />
    <text x="22" y="21" text-anchor="middle" font-size="14" font-weight="700" fill="#222">?♠</text>
  </g>
  <g transform="translate(161 374)">
    <rect width="44" height="32" rx="4" fill="#e8e8e8" stroke="#999" stroke-width="1.5" stroke-dasharray="3 2" />
    <text x="22" y="21" text-anchor="middle" font-size="14" font-weight="700" fill="#c0392b">?♥</text>
  </g>
  <g transform="translate(209 374)">
    <rect width="44" height="32" rx="4" fill="#e8e8e8" stroke="#999" stroke-width="1.5" stroke-dasharray="3 2" />
    <text x="22" y="21" text-anchor="middle" font-size="14" font-weight="700" fill="#222">?♣</text>
  </g>
  <g transform="translate(257 374)">
    <rect width="44" height="32" rx="4" fill="#e8e8e8" stroke="#999" stroke-width="1.5" stroke-dasharray="3 2" />
    <text x="22" y="21" text-anchor="middle" font-size="14" font-weight="700" fill="#c0392b">?♦</text>
